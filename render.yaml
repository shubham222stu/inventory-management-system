services:
  # FastAPI Backend Service
  - type: web
    name: stockflow-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: PORT
        value: 10000

# Managed PostgreSQL Database Service
databases:
  - name: stockflow-db
    plan: free
